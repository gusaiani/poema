<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>YouTube Banner — Poema</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 2560px;
    height: 1440px;
    overflow: hidden;
    background: #0b1a33;
    font-family: 'Inter', -apple-system, sans-serif;
    color: #e8edf4;
    position: relative;
  }

  /* Subtle grid texture */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 80px 80px;
    pointer-events: none;
  }

  /* Accent glow */
  .glow {
    position: absolute;
    width: 900px;
    height: 900px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(26,74,138,0.18) 0%, transparent 70%);
    top: -200px;
    left: -200px;
    pointer-events: none;
  }
  .glow-2 {
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(26,74,138,0.10) 0%, transparent 70%);
    bottom: -100px;
    right: 200px;
    pointer-events: none;
  }

  /* Safe zone guide (1546x423 centered) — invisible in production */
  /*
  .safe-zone {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 1546px; height: 423px;
    border: 1px dashed rgba(255,0,0,0.3);
    pointer-events: none;
  }
  */

  /* Safe zone: 1546x423 centered = x:507–2053, y:509–931 */
  .content {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 1546px;
    height: 423px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Hero number */
  .hero-number {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 130px;
    font-weight: 400;
    line-height: 1;
    letter-spacing: -2px;
    color: #ffffff;
    margin-bottom: 20px;
    text-align: center;
  }
  .hero-number .pct {
    font-size: 65px;
    letter-spacing: 0;
    opacity: 0.7;
    vertical-align: baseline;
    margin-left: 2px;
  }

  .hero-label {
    font-family: 'Inter', sans-serif;
    font-size: 38px;
    font-weight: 400;
    color: rgba(232,237,244,0.55);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 20px;
    text-align: center;
  }

  /* Stats row */
  .stats {
    display: flex;
    gap: 64px;
    align-items: baseline;
    justify-content: center;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: center;
    text-align: center;
  }

  .stat-value {
    font-family: 'DM Mono', monospace;
    font-size: 64px;
    font-weight: 400;
    color: #ffffff;
    line-height: 1.1;
  }

  .stat-label {
    font-family: 'Inter', sans-serif;
    font-size: 28px;
    font-weight: 400;
    color: rgba(232,237,244,0.45);
    letter-spacing: 1px;
  }

  /* Divider line between hero and stats */
  .divider {
    width: 80px;
    height: 2px;
    background: rgba(26,74,138,0.6);
    margin-bottom: 20px;
  }

  .stats-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Period tag */
  .period {
    font-family: 'Inter', sans-serif;
    font-size: 30px;
    font-weight: 300;
    color: rgba(255,255,255,0.75);
    letter-spacing: 2px;
  }


  /* poe.ma */
  .url {
    font-family: 'DM Mono', monospace;
    font-size: 36px;
    font-weight: 400;
    color: rgba(255,255,255,0.6);
    letter-spacing: 3px;
    margin-top: 20px;
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="glow-2"></div>

  <div class="content">
    <div class="hero-number">394,83<span class="pct">%</span></div>
    <div class="hero-label">Acumulado (jan/2017 – mar/2026)</div>
    <div class="divider"></div>
    <div class="stats">
      <div class="stat">
        <div class="stat-value">18,89%</div>
        <div class="stat-label">ao ano</div>
      </div>
      <div class="stat">
        <div class="stat-value">1,9x</div>
        <div class="stat-label">Ibovespa</div>
      </div>
      <div class="stat">
        <div class="stat-value">9 anos</div>
        <div class="stat-label">de track record</div>
      </div>
    </div>
    <div class="url">poe.ma</div>
  </div>
</body>
</html>
